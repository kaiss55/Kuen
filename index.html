<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus & Weather Dashboard</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .time-box { font-size: 3.5rem; color: #00ffcc; font-weight: bold; margin-bottom: 5px; }
        
        /* 天氣區域 */
        .weather-current { font-size: 1.8rem; margin-bottom: 15px; color: #fff; }
        .location-tag { font-size: 1rem; color: #888; display: block; margin-top: 2px; }
        
        /* 3日預報 UI */
        .forecast-container {
            display: flex;
            justify-content: space-between;
            background: #111;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .forecast-day {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.9rem;
            color: #ccc;
        }
        .forecast-day img { width: 45px; height: 45px; margin: 5px 0; }
        .forecast-temp { color: #ffaa00; font-weight: bold; }

        /* 【新增】左右滑動巴士卡片容器 */
        .bus-carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 15px;
            width: 100%;
            padding-bottom: 10px;
            /* 隱藏捲動條（滾動條） */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .bus-carousel::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        /* 巴士卡片樣式調整 */
        .bus-card {
            background: #111;
            border: 2px solid #333;
            border-radius: 20px;
            padding: 25px 20px;
            min-width: 100%; /* 確保一張卡片霸佔整個寬度 */
            box-sizing: border-box;
            scroll-snap-align: start; /* 滑動時自動吸附對齊 */
        }
        .bus-route { font-size: 3rem; font-weight: bold; color: #ffcc00; }
        .bus-location { font-size: 1.1rem; color: #888; margin-top: 5px; }
        
        /* 3班車時間佈局 */
        .bus-eta-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .eta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 20px;
            font-size: 1.6rem;
            border-bottom: 1px dashed #222;
        }
        .eta-row:last-child { border-bottom: none; }
        .eta-main { font-size: 2.4rem; color: #fff; font-weight: bold; }
        .eta-next { color: #aaa; }

        /* 【新增】小圓點指示器（話比你知有幾多個 Route） */
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #444;
            border-radius: 50%;
            transition: background 0.3s;
        }
        .dot.active {
            background: #00ffcc;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="time-box" id="live-clock">00:00:00</div>

    <div class="weather-current">
        <span id="temp">--</span>°C | <span id="humidity">--</span>%
        <span class="location-tag">葵青區 (荔景數據)</span>
    </div>

    <div class="forecast-container">
        <div class="forecast-day">
            <span id="f-date-1">--/--</span>
            <img id="f-icon-1" src="" style="display:none;" referrerpolicy="no-referrer">
            <span id="f-temp-1" class="forecast-temp">--°C</span>
        </div>
        <div class="forecast-day" style="border-left: 1px solid #222; border-right: 1px solid #222;">
            <span id="f-date-2">--/--</span>
            <img id="f-icon-2" src="" style="display:none;" referrerpolicy="no-referrer">
            <span id="f-temp-2" class="forecast-temp">--°C</span>
        </div>
        <div class="forecast-day">
            <span id="f-date-3">--/--</span>
            <img id="f-icon-3" src="" style="display:none;" referrerpolicy="no-referrer">
            <span id="f-temp-3" class="forecast-temp">--°C</span>
        </div>
    </div>

    <div class="bus-carousel" id="bus-carousel">
        </div>
    
    <div class="carousel-dots" id="carousel-dots"></div>
</div>

<script>
    // 【設定】你想顯示的巴士路線清單 (Stop ID, 路線名, 目的地名稱)
    const busRoutes = [
        { stopId: "6E6EBC9D1AF2DA52", route: "46X", location: "荔景邨日景樓 (往大圍/顯徑)" },
        { stopId: "1B89F83BD1FC3F74", route: "46X", location: "海福花園 (往美孚)" },
        { stopId: "941B58A78A49CD0B", route: "57M", location: "荔景北巴士總站(往山景)" }
    ];

    function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerText = now.toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function fetchCurrentWeather() {
        try {
            const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
            const data = await res.json();
            const kcTemp = data.temperature.data.find(item => item.place === '葵涌');
            document.getElementById('temp').innerText = kcTemp ? kcTemp.value : data.temperature.data[0].value;
            document.getElementById('humidity').innerText = data.humidity.data[0].value;
        } catch (e) { console.error("即時天氣更新失敗", e); }
    }

    async function fetchForecast() {
        try {
            const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
            const data = await res.json();
            
            for(let i = 1; i <= 3; i++) {
                const dayData = data.weatherForecast[i-1];
                const dateStr = dayData.forecastDate;
                const month = dateStr.substring(4,6);
                const day = dateStr.substring(6,8);
                document.getElementById(`f-date-${i}`).innerText = `${month}/${day}`;
                
                const iconId = dayData.ForecastIcon;
                const iconUrl = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconId}.png`;
                const imgTag = document.getElementById(`f-icon-${i}`);
                imgTag.referrerPolicy = "no-referrer";
                imgTag.src = iconUrl;
                imgTag.style.display = 'block';
                
                document.getElementById(`f-temp-${i}`).innerText = `${dayData.forecastMintemp.value}-${dayData.forecastMaxtemp.value}°C`;
            }
        } catch (e) { console.error("天氣預報更新失敗", e); }
    }

    // 初始化動態卡片 UI 結構
    function initBusCards() {
        const carousel = document.getElementById('bus-carousel');
        const dotsContainer = document.getElementById('carousel-dots');
        carousel.innerHTML = "";
        dotsContainer.innerHTML = "";

        busRoutes.forEach((bus, index) => {
            // 建立巴士卡片 HTML
            const card = document.createElement('div');
            card.className = "bus-card";
            card.innerHTML = `
                <div class="bus-route">九巴 ${bus.route}</div>
                <div class="bus-location">${bus.location}</div>
                <div class="bus-eta-container" id="eta-list-${index}">
                    <div style="font-size: 1.5rem; color: #888;">載入中...</div>
                </div>
            `;
            carousel.appendChild(card);

            // 建立指示小圓點
            const dot = document.createElement('div');
            dot.className = `dot ${index === 0 ? 'active' : ''}`;
            dotsContainer.appendChild(dot);
        });

        // 監聽滑動事件來更新小圓點顏色
        carousel.addEventListener('scroll', () => {
            const scrollLeft = carousel.scrollLeft;
            const cardWidth = carousel.clientWidth;
            const activeIndex = Math.round(scrollLeft / cardWidth);
            
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                if (idx === activeIndex) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        });
    }

    // 獲取所有路線的 ETA
    async function fetchAllBusETA() {
        for (let i = 0; i < busRoutes.length; i++) {
            const bus = busRoutes[i];
            const listContainer = document.getElementById(`eta-list-${i}`);
            
            try {
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${bus.stopId}/${bus.route}/1`);
                const data = await res.json();
                
                const validBuses = data.data.filter(item => item.eta);

                if (validBuses.length > 0) {
                    validBuses.sort((a, b) => new Date(a.eta) - new Date(b.eta));
                    
                    const uniqueBuses = [];
                    const seenTimes = new Set();
                    for (const b of validBuses) {
                        if (!seenTimes.has(b.eta)) {
                            seenTimes.add(b.eta);
                            uniqueBuses.push(b);
                        }
                    }

                    const maxBuses = Math.min(3, uniqueBuses.length);
                    let htmlContent = "";

                    for (let j = 0; j < maxBuses; j++) {
                        const etaTime = new Date(uniqueBuses[j].eta);
                        const now = new Date();
                        const diffMins = Math.max(0, Math.round((etaTime - now) / 1000 / 60)) -1;
                        
                        const hours = String(etaTime.getHours()).padStart(2, '0');
                        const minutes = String(etaTime.getMinutes()).padStart(2, '0');
                        const timeString = `${hours}:${minutes}`;

                        let label = `第 ${j+1} 班`;
                        if (j === 0) label = "下班車";
                        
                        if (j === 0) {
                            htmlContent += `
                                <div class="eta-row">
                                    <span style="color: #00ffcc; font-weight: bold;">${label}</span>
                                    <span class="eta-main">
                                        ${diffMins} 分鐘 <span style="font-size: 1.4rem; color: #ffcc00; font-weight: normal;">(${timeString})</span>
                                    </span>
                                </div>`;
                        } else {
                            htmlContent += `
                                <div class="eta-row eta-next">
                                    <span style="font-size: 1.3rem;">${label}</span>
                                    <span style="font-size: 1.5rem; font-weight: bold;">
                                        ${diffMins} 分鐘 <span style="font-size: 1.1rem; color: #888; font-weight: normal;">(${timeString})</span>
                                    </span>
                                </div>`;
                        }
                    }
                    listContainer.innerHTML = htmlContent;
                } else {
                    listContainer.innerHTML = `<div style="font-size: 1.8rem; padding: 20px;">暫無班次</div>`;
                }
            } catch (e) { 
                console.error(e);
                listContainer.innerHTML = `<div style="color: red;">更新失敗</div>`;
            }
        }
    }

    // 初始執行
    fetchCurrentWeather();
    fetchForecast();
    initBusCards();  // 先建立卡片結構
    fetchAllBusETA(); // 再去撈時間

    // 30秒更新
    setInterval(() => {
        fetchCurrentWeather();
        fetchAllBusETA();
    }, 30000);

    // 3小時更新預報
    setInterval(fetchForecast, 10800000);
</script>

</body>
</html>
